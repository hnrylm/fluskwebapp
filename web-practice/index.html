<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的留言板練習</title>
    <style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: #121212; /* 深黑色背景 */
        color: #e0e0e0; /* 淺灰色文字 */
        display: flex; 
        justify-content: center; 
        padding: 20px; 
    }
    
    .container { width: 100%; max-width: 550px; }
    
    /* 輸入區：改為深灰色卡片 */
    .input-box { 
        background: #1e1e1e; 
        padding: 20px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        margin-bottom: 30px; 
    }

    textarea { 
        width: 100%; 
        background: #2d2d2d; 
        border: 1px solid #444; 
        border-radius: 8px; 
        padding: 12px; 
        color: white; 
        box-sizing: border-box; 
        resize: none; 
        outline: none;
    }

    /* 按鈕：改為更顯眼的霓虹色系 */
    button { 
        background: #bb86fc; 
        color: #121212; 
        font-weight: bold;
        border: none; 
        padding: 10px 20px; 
        border-radius: 6px; 
        cursor: pointer; 
        margin-top: 15px; 
        transition: 0.3s;
    }
    button:hover { background: #cfabff; transform: translateY(-2px); }

    /* 留言卡片：加上微光邊框 */
    .message-card { 
        background: #1e1e1e; 
        padding: 15px; 
        border-radius: 12px; 
        margin-bottom: 15px; 
        border: 1px solid #333;
        transition: 0.3s;
    }
    .message-card:hover { border-color: #bb86fc; }

    .timestamp { 
        font-size: 0.75rem; 
        color: #777; 
        margin-top: 10px; 
        display: block; 
        font-style: italic;
    }
</style>

</head>
<body>

<div class="container">
    <div class="input-box">
        <textarea id="msgInput" rows="3" placeholder="想說些什麼嗎？"></textarea>
        <button onclick="addMessage()">發布留言</button>
    </div>
    <div id="board">
        <!-- 留言會出現在這裡 -->
    </div>
</div>

<script>
    function addMessage() {
        const input = document.getElementById('msgInput');
        const board = document.getElementById('board');
        
        if (input.value.trim() === "") return;

        // 建立留言卡片
        const card = document.createElement('div');
        card.className = 'message-card';
        
        // 獲取目前時間戳記
        const now = new Date().toLocaleString();
        
        card.innerHTML = `
            <p>${input.value}</p>
            <span class="timestamp">🕒 發布於：${now}</span>
        `;
        
        board.prepend(card); // 新留言放在最上面
        input.value = ""; // 清空輸入框
    }
</script>

</body>
</html>
