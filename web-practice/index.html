<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的留言板練習</title>
    <style>
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    min-height: 100vh;
    display: flex; 
    justify-content: center; 
    padding: 20px; 
    margin: 0;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

</style>


</head>
<body>

<div class="container">
    <div class="input-box">
        <textarea id="msgInput" rows="3" placeholder="想說些什麼嗎？"></textarea>
        <button onclick="addMessage()">發布留言</button>
    </div>
    <div id="board">
        <!-- 留言會出現在這裡 -->
    </div>
</div>

<script>
    function addMessage() {
        const input = document.getElementById('msgInput');
        const board = document.getElementById('board');
        
        if (input.value.trim() === "") return;

        // 建立留言卡片
        const card = document.createElement('div');
        card.className = 'message-card';
        
        // 獲取目前時間戳記
        const now = new Date().toLocaleString();
        
        card.innerHTML = `
            <p>${input.value}</p>
            <span class="timestamp">🕒 發布於：${now}</span>
        `;
        
        board.prepend(card); // 新留言放在最上面
        input.value = ""; // 清空輸入框
    }
</script>

</body>
</html>
