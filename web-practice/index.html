<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的留言板練習</title>
    <style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        /* 使用漸層背景，毛玻璃效果才明顯 */
        background: linear-gradient(45deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh;
        display: flex; 
        justify-content: center; 
        padding: 20px; 
        margin: 0;
    }
    
    .container { width: 100%; max-width: 500px; }
    
    /* 毛玻璃核心程式碼：rgba 透明度 + backdrop-filter 模糊 */
    .input-box, .message-card { 
        background: rgba(255, 255, 255, 0.15); 
        backdrop-filter: blur(10px); 
        -webkit-backdrop-filter: blur(10px); 
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px; 
        padding: 20px; 
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        margin-bottom: 20px;
    }

    textarea { 
        width: 100%; 
        background: rgba(255, 255, 255, 0.1); 
        border: 1px solid rgba(255, 255, 255, 0.3); 
        border-radius: 8px; 
        padding: 12px; 
        color: white; 
        box-sizing: border-box; 
        outline: none;
    }
    textarea::placeholder { color: rgba(255, 255, 255, 0.6); }

    button { 
        background: #ffffff; 
        color: #764ba2; 
        font-weight: bold;
        border: none; 
        padding: 10px 25px; 
        border-radius: 30px; 
        cursor: pointer; 
        margin-top: 15px; 
        transition: 0.3s;
    }
    button:hover { background: #f0f0f0; box-shadow: 0 0 15px rgba(255,255,255,0.5); }

    .message-card p { color: white; margin: 0; }
    .timestamp { 
        font-size: 0.7rem; 
        color: rgba(255, 255, 255, 0.6); 
        margin-top: 10px; 
        display: block; 
    }
</style>


</head>
<body>

<div class="container">
    <div class="input-box">
        <textarea id="msgInput" rows="3" placeholder="想說些什麼嗎？"></textarea>
        <button onclick="addMessage()">發布留言</button>
    </div>
    <div id="board">
        <!-- 留言會出現在這裡 -->
    </div>
</div>

<script>
    function addMessage() {
        const input = document.getElementById('msgInput');
        const board = document.getElementById('board');
        
        if (input.value.trim() === "") return;

        // 建立留言卡片
        const card = document.createElement('div');
        card.className = 'message-card';
        
        // 獲取目前時間戳記
        const now = new Date().toLocaleString();
        
        card.innerHTML = `
            <p>${input.value}</p>
            <span class="timestamp">🕒 發布於：${now}</span>
        `;
        
        board.prepend(card); // 新留言放在最上面
        input.value = ""; // 清空輸入框
    }
</script>

</body>
</html>
