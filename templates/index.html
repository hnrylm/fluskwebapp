<!DOCTYPE html>
<html>
    <head>
        <title>Flask 標單測試</title>
    </head>
    <body>
        <h1>歡迎來到我的Flask 網站</h1>
        <!--這是 Jinja2 的判斷式:如果名字存在就顯示-->
        {% if name %}
          <h2>你好,{{ name }}! 很高興見到你.</h2>
        {% else %}
          <p>請輸入你的名字:</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="user_name" placeholder="輸入名字">
            <button type="submit">送出</button>
        </form>
    </body>
</html>
